    <style id="loading-styles" type="text/css">
      * {
        box-sizing: border-box;
      }

      wf-html,
      html {
        -webkit-font-smoothing: antialiased;
        -webkit-text-size-adjust: none;
      }

      wf-body,
      body,
      wf-html,
      html,
      ul,
      ol,
      li,
      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin: 0;
        padding: 0;
      }

      wf-body,
      body {
        font-family:
          -apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Oxygen, Ubuntu, 'Helvetica Neue', Arial, sans-serif;
      }

      #loading-state {
        display: flex;
        height: 100vh;
        width: 100vw;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        /* Prevent massive cumulative layout shift when hiding/removing loading state*/
        position: absolute;
        top: 0;
        z-index: 9999;
        /* Start invisible; only become visible after 3s delay for fast connections */
        opacity: 0;
        animation: loading-state-appear 0s 3s forwards;
        transition: opacity 0.1s ease-out;
      }

      @keyframes loading-state-appear {
        to {
          opacity: 1;
        }
      }

      #loading-state.hide {
        opacity: 0;
        animation: none;
      }

      .dark-mode #loading-state {
        background: #0a0a0a;
      }

      .message {
        display: flex;
        flex-direction: column;
        align-items: center;
        line-height: 1.5;
        font-size: 20px;
        padding: 32px;
        max-width: 664px;
        width: 100%;
      }

      .dark-mode body {
        background-color: #0a0a0a;
        color: #d9d9d9;
      }

      .saml .message {
        display: flex;
        flex-direction: column;
        text-align: center;
        justify-content: center;
        align-items: center;
      }

      .saml .logo {
        display: flex;
        align-items: center;
        flex-direction: row;
        gap: 2rem;
      }

      .message svg {
        width: 128px;
        margin-bottom: 16px;
      }

      .loading-bar-container {
        width: 116px;
        height: 4px;
        background: #e5e5e5;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 6px;
        transform: translateX(-4.5px);
      }

      .dark-mode .loading-bar-container {
        background: #333;
      }

      .loading-bar {
        width: 25%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          #f78100 45%,
          #f78100 55%,
          transparent
        );
        border-radius: 2px;
        animation: loading-bar 1.5s ease-in-out infinite;
      }

      @keyframes loading-bar {
        0% {
          transform: translateX(-100%);
        }
        50% {
          transform: translateX(400%);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      @media screen and (prefers-reduced-motion: reduce) {
        .loading-bar {
          animation: none;
          transform: translateX(0);
        }
      }
