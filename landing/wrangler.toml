# oktryme.com edge Worker — brand landing + reverse-proxy to the main
# maps-website-builder Worker (§5b "Phase B"). Runs in the OLD personal account
# (where the oktryme.com zone lives), so it's a SEPARATE deploy from the root
# wrangler.toml (the main Worker in the dedicated account).
#
# Deploy:  npx wrangler deploy --config landing/wrangler.toml
name = "oktryme-landing"
main = "worker.js"
compatibility_date = "2024-09-01"
# Jreitano@gmail.com's Account (holds the oktryme.com zone). Account IDs aren't secret.
account_id = "734b321b1df2945df836ce873a7d2893"

# Apex + all paths → this Worker (serves landing, proxies app routes).
[[routes]]
pattern = "oktryme.com/*"
zone_name = "oktryme.com"

# www → apex (the Worker 301-redirects). Custom domain auto-manages DNS + cert.
[[routes]]
pattern = "www.oktryme.com"
custom_domain = true
