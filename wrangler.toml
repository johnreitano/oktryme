# Cloudflare Worker config — Phase 0 spikes (V3/V4).
# The single Worker renders preview + live, serves forms/QR, and handles Stripe webhooks.
name = "maps-website-builder"
main = "src/index.ts"
compatibility_date = "2024-09-01"
# Oktrymedigital@gmail.com account (dedicated maps-website-builder account). Account IDs are not secret.
account_id = "684b0476188597fc51262d99cc67e01f"

# Host that serves preview sites and the {handle}.<preview-host> live fallback.
[vars]
PREVIEW_HOST = "oktryme.com"

# Canonical business.json store. Create with:
#   wrangler kv namespace create BUSINESS_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "BUSINESS_KV"
id = "a71fcb2fcb8145b187b23f86a091ee7b"

# Secrets (set via `wrangler secret put <NAME>` — never commit):
#   STRIPE_SECRET_KEY        sk_test_... (test mode for V3)
#   STRIPE_WEBHOOK_SECRET    whsec_...
#   PRICE_SELF_SERVE         price_... ($49 tier)
#   PRICE_DONE_FOR_YOU       price_... ($99 tier)
#   CF_ACCOUNT_ID            Cloudflare account id (V1 real provisioning)
#   CF_API_TOKEN             scoped token: Workers + DNS + Zone + Registrar write
#   CF_WORKER_SERVICE        this Worker's name (custom-domain attach target)
#   RESEND_API_KEY           re_... (V5 outbound lead email)
#   LEADS_FROM               verified sender, e.g. "OK Try Me <leads@oktryme.com>"
#   OPS_FALLBACK_EMAIL       inbox for leads when a business has no email on file
#
# When CF_* are set, the Worker uses the real CloudflareProvisioner (V1);
# otherwise it falls back to the StubProvisioner (V3 test runs). Likewise
# RESEND_API_KEY + LEADS_FROM switch lead email from no-op logging to Resend.
